<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --accent-color: #0ff;
            --secondary-bg: #001;
            --border-color: #0ff;
            --shadow-color: rgba(0, 255, 255, 0.3);
        }

        .light-mode {
            --bg-color: #f0f0f0;
            --text-color: #000;
            --accent-color: #0066cc;
            --secondary-bg: #fff;
            --border-color: #0066cc;
            --shadow-color: rgba(0, 102, 204, 0.3);
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--shadow-color);
            font-size: 2em;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        #testResults {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--secondary-bg);
            border: 2px solid var(--border-color);
            padding: 20px;
            border-radius: 5px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
        }

        #testResults .pass { color: #8ef; }
        #testResults .fail { color: #f66; }
        #testResults .summary { margin-top: 20px; }

        button {
            background: var(--secondary-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            border: 3px solid var(--border-color);
            background: var(--secondary-bg);
            overflow: hidden;
            box-shadow: 0 0 20px var(--shadow-color);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 200px;
        }

        .stats {
            background: var(--secondary-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 5px;
        }

        .stats h3 {
            margin: 0 0 10px 0;
            color: var(--accent-color);
        }

        .stats p {
            margin: 5px 0;
            font-size: 16px;
        }

        #nextPiece {
            background: var(--secondary-bg);
            border: 2px solid var(--border-color);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        #nextPiece h3 {
            margin: 0 0 10px 0;
            color: var(--accent-color);
        }

        #nextCanvas {
            display: block;
            width: 100%;
            height: 100px;
            background: transparent;
        }

        .controls {
            background: var(--secondary-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 5px;
        }

        .controls h3 {
            margin: 0 0 10px 0;
            color: var(--accent-color);
        }

        .controls p {
            margin: 5px 0;
            font-size: 14px;
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
            max-width: 360px;
        }

        .mobile-controls button {
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            min-width: 60px;
            min-height: 60px;
            touch-action: none; /* Prevent scrolling on touch */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
        }

        .mobile-controls button span {
            display: block;
            font-size: 1.2em;
        }

        .mobile-controls button small {
            display: block;
            font-size: 0.75em;
            font-weight: normal;
        }

        .mobile-controls button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        @media (min-width: 769px) {
            .mobile-controls {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
            }

            #gameContainer {
                width: 100%;
                max-width: 400px;
                height: 500px;
            }

            .sidebar {
                width: 100%;
                max-width: 400px;
                flex-direction: row;
                justify-content: space-around;
            }

            .stats, .controls {
                flex: 1;
            }

            #nextPiece {
                width: 120px;
            }

            .mobile-controls {
                display: grid;
            }

            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Tetris</h1>
        <div class="header-buttons">
            <button id="themeToggle">🌙 Dark</button>
            <button id="testBtn">Test</button>
            <button id="resetBtn">Reset</button>
            <button id="pauseBtn">Pause</button>
            <button id="autoPlayBtn">Auto Play</button>
            <button id="backBtn">Back</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="200" height="400"></canvas>
        </div>

        <div class="sidebar">
            <div class="stats">
                <h3>Stats</h3>
                <p>Score: <span id="score">0</span></p>
                <p>High Score: <span id="highScore">0</span></p>
                <p>Lines: <span id="lines">0</span></p>
                <p>Level: <span id="level">1</span></p>
            </div>

            <div id="nextPiece">
                <h3>Next</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>

            <div class="controls">
                <h3>Controls</h3>
                <p>← → : Move</p>
                <p>↓ : Soft drop</p>
                <p>↑ / R : Rotate</p>
                <p>Space : Hard drop</p>
                <p>P : Pause</p>
                <p>Q/W/E/A/S/D on mobile match the button grid</p>
                <p>R (game over) : Restart</p>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <button id="qBtn"><span>Q</span><small>Reset</small></button>
        <button id="wBtn"><span>W</span><small>Drop</small></button>
        <button id="eBtn"><span>E</span><small>Rotate</small></button>
        <button id="rBtn"><span>R</span><small>Pause</small></button>
        <button id="aBtn"><span>A</span><small>Left</small></button>
        <button id="sBtn"><span>S</span><small>Down</small></button>
        <button id="dBtn"><span>D</span><small>Right</small></button>
    </div>

    <div id="testResults">
        <h2>Tetris Core Tests</h2>
        <div id="testResultsContent"></div>
        <div class="summary" id="testSummary"></div>
        <button id="closeTestBtn">Close</button>
    </div>

    <script type="module" src="./tetris-core.js"></script>
    <script type="module">
        import { createBoard, createPiece, rotateMatrix, isValidMove, placePiece, clearLines, TETROMINOES, COLS, ROWS } from './tetris-core.js';

        const testBtn = document.getElementById('testBtn');
        const testResults = document.getElementById('testResults');
        const testResultsContent = document.getElementById('testResultsContent');
        const testSummary = document.getElementById('testSummary');
        const closeTestBtn = document.getElementById('closeTestBtn');

        let passed = 0;
        let failed = 0;

        function report(name, condition) {
            const node = document.createElement('div');
            node.textContent = `${condition ? 'PASS' : 'FAIL'}: ${name}`;
            node.className = condition ? 'pass' : 'fail';
            testResultsContent.appendChild(node);
            if (condition) passed += 1; else failed += 1;
        }

        function runTests() {
            testResultsContent.innerHTML = '';
            passed = 0;
            failed = 0;

            report('createPiece returns centered piece', () => {
                const piece = createPiece(0);
                return piece.shape && piece.x === Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2);
            });

            report('rotateMatrix rotates T correctly', () => {
                const rotated = rotateMatrix(TETROMINOES[2]);
                return rotated[0][1] === 1 && rotated[1][0] === 1 && rotated[1][1] === 1 && rotated[1][2] === 1;
            });

            report('isValidMove rejects wall collision', () => {
                const board = createBoard();
                const piece = createPiece(0);
                piece.x = -1;
                return !isValidMove(board, piece, piece.x, piece.y);
            });

            report('isValidMove detects piece collision', () => {
                const board = createBoard();
                board[0][5] = 1;
                const piece = createPiece(2);
                piece.x = 4;
                piece.y = 0;
                return !isValidMove(board, piece, piece.x, piece.y);
            });

            report('placePiece updates board cells', () => {
                const board = createBoard();
                const piece = createPiece(4);
                piece.x = 0;
                piece.y = 0;
                placePiece(board, piece);
                return board[0][0] === piece.color && board[0][1] === piece.color;
            });

            report('clearLines removes completed rows', () => {
                const board = createBoard();
                board[ROWS - 1] = Array(COLS).fill(1);
                const cleared = clearLines(board);
                return cleared === 1 && board[0].every(cell => cell === 0) && board[ROWS - 1].every(cell => cell === 0);
            });

            testSummary.textContent = `Results: ${passed} passed, ${failed} failed.`;
        }

        testBtn.addEventListener('click', () => {
            testResults.style.display = 'block';
            runTests();
        });

        closeTestBtn.addEventListener('click', () => {
            testResults.style.display = 'none';
        });
    </script>
</body>
</html>
