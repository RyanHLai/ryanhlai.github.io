<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Core Tests</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #111;
            color: #f0f0f0;
        }
        .pass { color: #8ef; }
        .fail { color: #f66; }
        .summary { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Tetris Core Tests</h1>
    <div id="results"></div>
    <div class="summary" id="summary"></div>

    <script type="module">
        import { createBoard, createPiece, rotateMatrix, isValidMove, placePiece, clearLines, TETROMINOES, COLS, ROWS } from './tetris-core.js';

        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passed = 0;
        let failed = 0;

        function report(name, condition) {
            const node = document.createElement('div');
            node.textContent = `${condition ? 'PASS' : 'FAIL'}: ${name}`;
            node.className = condition ? 'pass' : 'fail';
            results.appendChild(node);
            if (condition) passed += 1; else failed += 1;
        }

        function runTests() {
            report('createPiece returns centered piece', () => {
                const piece = createPiece(0);
                return piece.shape && piece.x === Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2);
            });

            report('rotateMatrix rotates T correctly', () => {
                const rotated = rotateMatrix(TETROMINOES[2]);
                return rotated[0][1] === 1 && rotated[1][0] === 1 && rotated[1][1] === 1 && rotated[1][2] === 1;
            });

            report('isValidMove rejects wall collision', () => {
                const board = createBoard();
                const piece = createPiece(0);
                piece.x = -1;
                return !isValidMove(board, piece, piece.x, piece.y);
            });

            report('isValidMove detects piece collision', () => {
                const board = createBoard();
                board[0][5] = 1;
                const piece = createPiece(2);
                piece.x = 4;
                piece.y = 0;
                return !isValidMove(board, piece, piece.x, piece.y);
            });

            report('placePiece updates board cells', () => {
                const board = createBoard();
                const piece = createPiece(4);
                piece.x = 0;
                piece.y = 0;
                placePiece(board, piece);
                return board[0][0] === piece.color && board[0][1] === piece.color;
            });

            report('clearLines removes completed rows', () => {
                const board = createBoard();
                board[ROWS - 1] = Array(COLS).fill(1);
                const cleared = clearLines(board);
                return cleared === 1 && board[0].every(cell => cell === 0) && board[ROWS - 1].every(cell => cell === 0);
            });

            summary.textContent = `Results: ${passed} passed, ${failed} failed.`;
        }

        runTests();
    </script>
</body>
</html>
